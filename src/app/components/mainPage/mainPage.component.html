<p-toast class="custom-toast" position="bottom-right"/>
<div class="flex flex-wrap mx-2 lg:mx-7 max-h-full justify-content-between">
    <div class="flex-1 px-4 py-2 max-w-50rem min-w-full lg:min-w-0">
        <div class="flex flex-wrap justify-content-between">
            <h2>New Annotation</h2>
            <p-button class="docs-button m-3 mx-0" *ngIf="logged" variant="text" label="My Documents" 
                    icon="pi pi-file" (click)="navigateToMyDocs()" [disabled]="!logged" />
        </div>
        <div class="h-full flex flex-column">
            <p-accordion [value]="['0', '1', '2', '3']" [multiple]="true" class="custom-acordion">
                <p-accordion-panel value="0">
                    <p-accordion-header>Upload File</p-accordion-header>
                    <p-accordion-content>
                        <app-upload-document (pdfDocumentChange)="onPdfDocChange($event)" (documentDataChange)="formContent = $event" (conceptsChange)="bokRelations = $event"></app-upload-document>
                    </p-accordion-content>
                </p-accordion-panel>

                <p-accordion-panel value="3">
                    <p-accordion-header>AI BoK Concept Matching</p-accordion-header>
                    <p-accordion-content>
                        <app-ai-bok-matching [pdfDoc]="pdfDoc" [pdfArrayBuffer]="pdfArrayBuffer" [(bokRelations)]="bokRelations"></app-ai-bok-matching>
                    </p-accordion-content>
                </p-accordion-panel>
            
                <p-accordion-panel value="1">
                    <p-accordion-header>Knowledge Annotated</p-accordion-header>
                    <p-accordion-content>
                        <app-annotate-document [concept]="concept" [(bokConcepts)]="bokRelations" [isPdfAvailable]="pdfDoc != null"></app-annotate-document>
                    </p-accordion-content>
                </p-accordion-panel>
            
                <p-accordion-panel value="2" [disabled]="!logged">
                    <p-accordion-header>Document Information</p-accordion-header>
                    <p-accordion-content>
                        <app-document-information [(formData)]="formContent" [isPdfAvailable]="pdfDoc != null" [logged]="logged"></app-document-information>
                    </p-accordion-content>
                </p-accordion-panel>
            </p-accordion>
    
            <div class="flex flex-wrap gap-4 m-3">
                <p-button class="custom-button" (click)="onDownload()" [disabled]="pdfDoc == null">Download</p-button>
                <p-button class="custom-button" (click)="onSave()" [loading]="loading" [disabled]="pdfDoc == null || !logged || !checkFormContent()">Save</p-button>
            </div>
        </div>
    </div>
    <p-divider class="hidden lg:flex my-3" layout="vertical" />
    <div class="flex-1 responsive-wrapper lg:mx-auto">
        <bok-visualization [(selectedConcept)]="concept" [showDescription]="false"> </bok-visualization>
    </div>
</div>
